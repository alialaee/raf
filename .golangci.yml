version: "2"

linters:
  default: standard
  enable:
    - govet
    - staticcheck
    - ineffassign
    - bodyclose
    - unconvert
    - unparam
    - misspell
    - errcheck
  exclusions:
    rules:
      - path: ".*_test.go"
        linters:
          - errcheck
          - gocyclo
          - dupl
          - gosec
formatters:
  enable:
    - gofmt
